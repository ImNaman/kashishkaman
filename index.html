<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>For Kashish 💛</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Caveat:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blush:#FFF0F4;
    --rose:#E8547C;
    --rose-deep:#C23A66;
    --plum:#5E2440;
    --gold:#F6C453;
    --cream:#FFF9FB;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; height:100%; overflow:hidden; }
  body{
    font-family:'Nunito',system-ui,sans-serif;
    color:var(--plum);
    background:
      radial-gradient(1200px 800px at 20% -10%, #FFE1EA 0%, transparent 60%),
      radial-gradient(1000px 700px at 90% 110%, #FFE7C2 0%, transparent 55%),
      linear-gradient(160deg, #FFF0F4 0%, #FFE6EE 45%, #FFEFE0 100%);
    min-height:100dvh;
    position:relative;
  }

  /* floating ambient hearts */
  .sky{ position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0; }
  .float{ position:absolute; bottom:-40px; font-size:22px; opacity:0; animation:rise linear infinite; will-change:transform,opacity; }
  @keyframes rise{
    0%{ transform:translateY(0) rotate(0deg); opacity:0; }
    12%{ opacity:.9; }
    100%{ transform:translateY(-115dvh) rotate(360deg); opacity:0; }
  }

  .page{
    position:relative; z-index:2;
    min-height:100dvh;
    display:none;
    flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center;
    padding:28px 22px;
  }
  .page.active{ display:flex; animation:fadeIn .7s ease both; }
  @keyframes fadeIn{ from{ opacity:0; transform:translateY(10px);} to{ opacity:1; transform:none;} }

  /* ---------- PAGE 1 ---------- */
  .eyebrow{
    font-family:'Baloo 2'; font-weight:600; letter-spacing:.14em;
    text-transform:uppercase; font-size:12px; color:var(--rose-deep);
    background:rgba(255,255,255,.6); padding:7px 16px; border-radius:999px;
    box-shadow:0 6px 18px rgba(194,58,102,.12);
  }
  .q{
    font-family:'Baloo 2'; font-weight:800; line-height:1.1;
    font-size:clamp(30px, 8.5vw, 56px); color:var(--plum);
    margin:22px 0 6px; max-width:14ch;
    text-shadow:0 2px 0 rgba(255,255,255,.7);
  }
  .q .accent{ color:var(--rose); }
  .sub{ font-weight:600; color:#9a6a7f; font-size:clamp(14px,3.6vw,17px); margin:2px 0 30px; }

  .btns{ display:flex; gap:18px; align-items:center; justify-content:center; flex-wrap:wrap; }
  .btn{
    font-family:'Baloo 2'; font-weight:700; font-size:clamp(18px,5vw,22px);
    border:none; border-radius:999px; cursor:pointer;
    padding:16px 42px; color:#fff;
    box-shadow:0 10px 24px rgba(0,0,0,.14);
    transition:transform .12s ease, box-shadow .2s ease;
    touch-action:manipulation; user-select:none;
  }
  #yesBtn{ background:linear-gradient(180deg,#7BD389,#4FB86A); }
  #noBtn{ background:linear-gradient(180deg,#FF7BA0,#E8547C); }
  #noBtn:active{ transform:scale(.96); }
  #yesBtn.loose{ position:fixed; z-index:5; margin:0; }

  .taunt{
    font-family:'Caveat'; font-weight:700;
    font-size:clamp(22px,6vw,30px); color:var(--rose-deep);
    margin-top:26px; min-height:38px; opacity:0;
    transition:opacity .25s ease, transform .25s ease; transform:translateY(6px);
  }
  .taunt.show{ opacity:1; transform:none; }

  /* ---------- PAGE 2 ---------- */
  #page2{ justify-content:flex-start; padding-top:min(14vh,120px); }
  .love-eyebrow{
    font-family:'Baloo 2'; font-weight:600; letter-spacing:.2em; text-transform:uppercase;
    font-size:12px; color:var(--rose-deep); opacity:0;
  }
  .shayari{
    font-family:'Caveat'; font-weight:600;
    font-size:clamp(26px, 6.4vw, 40px); line-height:1.5; color:var(--plum);
    max-width:22ch; margin:26px auto 0;
  }
  .line{ opacity:0; transform:translateY(14px); display:block; margin:14px 0; }
  .line.show{ animation:lineIn 1s ease both; }
  @keyframes lineIn{ to{ opacity:1; transform:none; } }
  .heart-divider{ font-size:26px; margin:22px 0 8px; opacity:0; }
  .heart-divider.show{ animation:pop .6s ease both; }
  @keyframes pop{ 0%{transform:scale(0);opacity:0;} 70%{transform:scale(1.25);} 100%{transform:scale(1);opacity:1;} }
  .sign{
    font-family:'Caveat'; font-weight:700; font-size:clamp(24px,6vw,34px);
    color:var(--rose); opacity:0;
  }
  .sign.show{ animation:lineIn 1s ease both; }

  /* sliding image ribbon at the bottom */
  .ribbon{
    position:fixed; left:0; right:0; bottom:0; z-index:3;
    height:190px; overflow:hidden; pointer-events:none;
    -webkit-mask-image:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent);
            mask-image:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent);
  }
  .track{ display:flex; align-items:flex-end; height:100%; width:max-content; animation:slide 26s linear infinite; }
  .track img{ height:180px; width:auto; display:block; margin:0 26px; filter:drop-shadow(0 8px 18px rgba(94,36,64,.25)); border-radius:18px; }
  @keyframes slide{ from{ transform:translateX(0);} to{ transform:translateX(-50%);} }

  @media (max-width:400px){
    .ribbon{ height:150px; }
    .track img{ height:140px; }
  }

  @media (prefers-reduced-motion: reduce){
    .float{ display:none; }
  }
</style>
</head>
<body>
  <div class="sky" id="sky" aria-hidden="true"></div>

  <!-- PAGE 1 -->
  <section class="page active" id="page1">
    <span class="eyebrow">For Kashish 💛</span>
    <h1 class="q">Ready for today's <span class="accent">shayari?</span></h1>
    <p class="sub">choose wisely, jaan 😌</p>
    <div class="btns" id="btnRow">
      <button class="btn" id="yesBtn" type="button">Yes</button>
      <button class="btn" id="noBtn" type="button">No</button>
    </div>
    <p class="taunt" id="taunt"></p>
  </section>

  <!-- PAGE 2 -->
  <section class="page" id="page2">
    <span class="love-eyebrow" id="p2eyebrow">sirf aapke liye · from Naman</span>
    <div class="shayari">
      <span class="line" data-line="1">Dil ki baatein kagaz par utarna itna aasaan nahi...</span>
      <span class="heart-divider" data-line="2">💗</span>
      <span class="line" data-line="3">Aisi koi shayari nahi bani jo main aapke liye jo mehsoos karta hoon, woh bayaan kar paaye.</span>
    </div>
    <span class="sign" data-line="4">— tumhara Naman</span>
  </section>

  <!-- sliding ribbon (only visible on page 2) -->
  <div class="ribbon" id="ribbon" style="display:none;" aria-hidden="true">
    <div class="track" id="track"></div>
  </div>

    var emojis = ['💗','🌷','💛','🌸','✨','💕'];
    for(var i=0;i<16;i++){
      var s=document.createElement('span');
      s.className='float';
      s.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      s.style.left=(Math.random()*100)+'vw';
      s.style.fontSize=(16+Math.random()*22)+'px';
      s.style.animationDuration=(9+Math.random()*11)+'s';
      s.style.animationDelay=(Math.random()*12)+'s';
      sky.appendChild(s);
    }
  })();

  /* ---- runaway Yes button (works on tap + hover) ---- */
  var yes = document.getElementById('yesBtn');
  var taunt = document.getElementById('taunt');
  var taunts = [
    "No! You are not ready 😤",
    "Nope, try again 😆",
    "Arre nahi! catch me first 🙈",
    "Not happening 💅",
    "Uff, itni jaldi? 😌",
    "Just click No na 🥺"
  ];
  var t = 0;

  function dodge(e){
    if(e){ e.preventDefault(); }
    if(!yes.classList.contains('loose')){ yes.classList.add('loose'); }

    var bw = yes.offsetWidth, bh = yes.offsetHeight;
    var pad = 12;
    var maxX = Math.max(pad, window.innerWidth  - bw - pad);
    var maxY = Math.max(pad, window.innerHeight - bh - pad);
    var x = pad + Math.random()*(maxX - pad);
    var y = pad + Math.random()*(maxY - pad);
    yes.style.left = x + 'px';
    yes.style.top  = y + 'px';

    taunt.textContent = taunts[t % taunts.length];
    taunt.classList.add('show');
    t++;
  }

  ['pointerenter','pointerdown','mousedown','touchstart','click','focus'].forEach(function(ev){
    yes.addEventListener(ev, dodge, {passive:false});
  });

  /* ---- No button → go to page 2 ---- */
  document.getElementById('noBtn').addEventListener('click', function(){
    document.getElementById('page1').classList.remove('active');

    // build the sliding image track (duplicated for seamless loop)
    var track = document.getElementById('track');
    var html = '';
    for(var i=0;i<8;i++){ html += '<img src="'+IMG+'" alt="a little flower for you">'; }
    track.innerHTML = html;
    document.getElementById('ribbon').style.display = 'block';

    var p2 = document.getElementById('page2');
    p2.classList.add('active');

    // reveal shayari line-by-line
    document.getElementById('p2eyebrow').style.animation = 'fadeIn 1s ease .2s both';
    var items = p2.querySelectorAll('[data-line]');
    items.forEach(function(el, idx){
      setTimeout(function(){ el.classList.add('show'); }, 700 + idx*1400);
    });
    var sign = p2.querySelector('.sign');
    setTimeout(function(){ sign.classList.add('show'); }, 700 + items.length*1400);
  });
</script>
</body>
</html>
